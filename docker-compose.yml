version: '3.8'

services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: shruti-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-intelligence}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1.5g
    restart: always

  redis:
    image: redis:7-alpine
    container_name: shruti-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always

volumes:
  postgres_data:
  redis_data:
